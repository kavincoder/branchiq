version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: branchiq
      POSTGRES_USER: branchiq
      POSTGRES_PASSWORD: branchiq_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U branchiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://branchiq:branchiq_dev@db:5432/branchiq
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production-generate-with-openssl-rand-hex-32}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      DB_POOL_SIZE: 10
      DB_MAX_OVERFLOW: 20
    volumes:
      - ./backend:/app    # hot-reload in dev; remove for prod
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
